<ion-header>
  <ion-toolbar>
    <ion-title>Histórico</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngFor="let item of historico">
    <ion-card-content>

      <strong>
        {{ item.valor }} {{ item.origem }} → {{ item.destino }}
      </strong>

      <p>
        Resultado: {{ item.resultado }} {{ item.destino }}
      </p>

      <p>
        {{ item.data | date:'dd/MM/yyyy HH:mm' }}
      </p>

    </ion-card-content>
  </ion-card>

  <p *ngIf="historico.length === 0" class="ion-text-center">
    Nenhum histórico encontrado
  </p>

</ion-content>
