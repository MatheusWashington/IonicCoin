<ion-header>
  <ion-toolbar>
    <ion-title>Conversor de Moedas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-label position="stacked">Valor</ion-label>
    <ion-input
      type="number"
      [(ngModel)]="amount">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-label>Origem</ion-label>
    <ion-select [(ngModel)]="fromCurrency">
      <ion-select-option
        *ngFor="let currency of currencies"
        [value]="currency">
        {{ currency }}
      </ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-label>Destino</ion-label>
    <ion-select [(ngModel)]="toCurrency">
      <ion-select-option
        *ngFor="let currency of currencies"
        [value]="currency">
        {{ currency }}
      </ion-select-option>
    </ion-select>
  </ion-item>

  <ion-button
    expand="block"
    (click)="convert()">
    Converter
  </ion-button>

  <ion-card *ngIf="result">
    <ion-card-content>
      Resultado:
      {{ result | number:'1.2-2' }}
      {{ toCurrency }}
    </ion-card-content>
  </ion-card>

</ion-content>
